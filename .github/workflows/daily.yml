name: Daily Sentiment Analysis

on:
  schedule:
    # 北京时间每天 08:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Prepare config
        run: cp config.example.json config.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run yesterday sentiment analysis
        env:
          TZ: Asia/Shanghai
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python main.py --yesterday --no-browser

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data.json index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily sentiment $(date -u +%Y-%m-%d)"
            git push
          fi
